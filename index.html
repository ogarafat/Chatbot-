<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ai Fizza - আপনার AI সহকারী</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .chat-container {
            width: 400px;
            max-width: 90%;
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: 80vh;
        }
        .header {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            padding: 15px;
            text-align: center;
            font-size: 1.2em;
        }
        .chat-box {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .message {
            max-width: 80%;
            padding: 10px 15px;
            border-radius: 20px;
            line-height: 1.4;
        }
        .user {
            align-self: flex-end;
            background: #667eea;
            color: white;
        }
        .bot {
            align-self: flex-start;
            background: #e5e5ea;
            color: black;
        }
        .input-area {
            display: flex;
            padding: 10px;
            background: #f9f9f9;
            border-top: 1px solid #ddd;
        }
        #user-input {
            flex: 1;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 25px;
            outline: none;
        }
        button {
            margin-left: 10px;
            padding: 12px 20px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
        }
        .voice-btn {
            background: #764ba2;
        }
        .typing {
            font-style: italic;
            color: #888;
        }
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="header">Ai Fizza - আপনার বন্ধুসুলভ AI</div>
        <div class="chat-box" id="chat-box">
            <div class="message bot">হ্যালো! আমি Ai Fizza। আপনাকে কীভাবে সাহায্য করতে পারি? 😊 (ইংরেজি, বাংলা, হিন্দি বা Banglish-এ কথা বলতে পারেন)</div>
        </div>
        <div class="input-area">
            <input type="text" id="user-input" placeholder="আপনার মেসেজ লিখুন...">
            <button id="send-btn">পাঠান</button>
            <button id="voice-btn" class="voice-btn">🎤</button>
        </div>
    </div>

    <script>
        const chatBox = document.getElementById('chat-box');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');
        const voiceBtn = document.getElementById('voice-btn');

        let messages = [
            { role: 'system', content: 'তুমি Ai Fizza, একজন বন্ধুসুলভ, হাস্যোজ্জ্বল এবং সাহায্যকারী AI সহকারী। বাংলা, ইংরেজি, হিন্দি বা Banglish-এ উত্তর দাও। সবসময় ইমোজি ব্যবহার করো এবং বন্ধুর মতো কথা বলো। 😊' }
        ];

        const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
        recognition.lang = 'bn-BD';
        recognition.continuous = false;

        const synth = window.speechSynthesis;

        function addMessage(text, sender) {
            const msgDiv = document.createElement('div');
            msgDiv.classList.add('message', sender);
            msgDiv.textContent = text;
            chatBox.appendChild(msgDiv);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function addTypingIndicator() {
            const typingDiv = document.createElement('div');
            typingDiv.classList.add('message', 'bot', 'typing');
            typingDiv.textContent = 'Ai Fizza টাইপ করছে...';
            typingDiv.id = 'typing';
            chatBox.appendChild(typingDiv);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function removeTypingIndicator() {
            const typing = document.getElementById('typing');
            if (typing) typing.remove();
        }

        async function sendMessage() {
            const text = userInput.value.trim();
            if (!text) return;

            addMessage(text, 'user');
            userInput.value = '';

            messages.push({ role: 'user', content: text });

            addTypingIndicator();

            const API_KEY = 'xai-RHdcrjWl3F6uh0As0DTW8WqyKbWdQYI3HsYNlm05PijKCuqVlwRdJ189o4dNGxbcPDbOr4vaOCuO2ZQn'; // এখানে আপনার নতুন xAI API কী বসান

            try {
                const response = await fetch('https://api.x.ai/v1/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${API_KEY}`
                    },
                    body: JSON.stringify({
                        model: 'grok-4',
                        messages: messages,
                        temperature: 0.7,
                        max_tokens: 800,
                        stream: false
                    })
                });

                if (!response.ok) {
                    throw new Error(`API Error: ${response.status} - ${await response.text()}`);
                }

                const data = await response.json();
                const botResponse = data.choices[0].message.content;

                messages.push({ role: 'assistant', content: botResponse });

                removeTypingIndicator();
                addMessage(botResponse, 'bot');

                const utter = new SpeechSynthesisUtterance(botResponse);
                utter.lang = 'bn-BD';
                synth.speak(utter);

            } catch (error) {
                removeTypingIndicator();
                addMessage('দুঃখিত, কোনো সমস্যা হয়েছে: ' + error.message + '। API কী চেক করুন।', 'bot');
                console.error(error);
            }
        }

        sendBtn.addEventListener('click', sendMessage);
        userInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });

        voiceBtn.addEventListener('click', () => {
            recognition.start();
            voiceBtn.textContent = '🛑';
        });

        recognition.onresult = (event) => {
            const transcript = event.results[0][0].transcript;
            userInput.value = transcript;
            sendMessage();
            voiceBtn.textContent = '🎤';
        };

        recognition.onend = () => {
            voiceBtn.textContent = '🎤';
        };
    </script>
</body>
    </html>
